<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#07080d">
  <title>Kultura — Autentificare</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #07080d;
      --surface: #14182b;
      --surface-elev: #1a1f35;
      --border: rgba(255,255,255,0.14);
      --text: #f8fafc;
      --text-dim: #94a3b8;
      --text-mute: #64748b;
      --blue: #3b82f6;
      --cyan: #06b6d4;
      --purple: #8b5cf6;
      --pink: #ec4899;
      --green: #10b981;
      --red: #ef4444;
      --orange: #f59e0b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { min-height: 100%; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      overflow-x: hidden;
      position: relative;
      -webkit-font-smoothing: antialiased;
    }
    body::before, body::after {
      content: "";
      position: fixed;
      border-radius: 50%;
      filter: blur(140px);
      pointer-events: none;
      z-index: 0;
    }
    body::before {
      width: 500px; height: 500px;
      background: var(--purple);
      opacity: 0.30;
      top: -160px; left: -160px;
    }
    body::after {
      width: 440px; height: 440px;
      background: var(--blue);
      opacity: 0.24;
      bottom: -160px; right: -160px;
    }

    .brand-mark {
      position: fixed;
      top: 24px;
      left: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 10;
    }
    .brand-icon {
      width: 36px; height: 36px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--blue), var(--purple));
      display: grid; place-items: center;
      box-shadow: 0 8px 20px rgba(59,130,246,0.35);
    }
    .brand-icon svg { width: 20px; height: 20px; color: #fff; }
    .brand-name {
      font-size: 17px;
      font-weight: 800;
      letter-spacing: -0.3px;
    }

    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 440px;
      padding: 44px 32px 36px;
      background: linear-gradient(160deg, rgba(26,31,53,0.90), rgba(14,17,32,0.80));
      border: 1px solid var(--border);
      border-radius: 32px;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      box-shadow: 0 30px 80px rgba(0,0,0,0.4);
    }
    h1 {
      font-size: 32px;
      font-weight: 900;
      letter-spacing: -1px;
      margin-bottom: 8px;
      text-align: center;
    }
    p.sub {
      color: var(--text-dim);
      font-size: 14px;
      text-align: center;
      margin-bottom: 28px;
    }

    .field {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border);
      border-radius: 16px;
      margin-bottom: 12px;
      transition: border-color 0.15s;
    }
    .field:focus-within { border-color: var(--blue); }
    .field svg {
      width: 18px; height: 18px;
      color: var(--text-mute);
      flex-shrink: 0;
    }
    .field input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: inherit;
      font-size: 15px;
      padding: 2px 0;
    }
    .field input::placeholder { color: var(--text-mute); }
    .field button.eye {
      background: transparent;
      border: none;
      color: var(--text-mute);
      cursor: pointer;
      padding: 4px;
      display: grid;
      place-items: center;
    }
    .field button.eye:hover { color: var(--text); }

    .msg {
      padding: 12px 14px;
      border-radius: 12px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
      align-items: flex-start;
      gap: 10px;
    }
    .msg.show { display: flex; }
    .msg.error {
      background: rgba(239,68,68,0.12);
      border: 1px solid rgba(239,68,68,0.35);
      color: var(--text);
    }
    .msg.success {
      background: rgba(16,185,129,0.12);
      border: 1px solid rgba(16,185,129,0.35);
      color: var(--text);
    }
    .msg svg { width: 18px; height: 18px; flex-shrink: 0; margin-top: 1px; }
    .msg.error svg { color: var(--red); }
    .msg.success svg { color: var(--green); }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 16px 24px;
      font-size: 15px;
      font-weight: 700;
      font-family: inherit;
      color: #fff;
      background: linear-gradient(90deg, var(--blue), var(--cyan));
      border: none;
      border-radius: 16px;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.15s, box-shadow 0.2s, opacity 0.15s;
      box-shadow: 0 12px 28px rgba(59,130,246,0.35);
      margin-top: 8px;
    }
    .btn:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 16px 34px rgba(59,130,246,0.45); }
    .btn:active:not(:disabled) { transform: translateY(0); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn.ghost {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
      box-shadow: none;
    }
    .btn.ghost:hover:not(:disabled) { background: rgba(255,255,255,0.04); }

    .spinner {
      width: 20px; height: 20px;
      border: 2.5px solid rgba(255,255,255,0.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .toggle {
      text-align: center;
      margin-top: 24px;
      color: var(--text-dim);
      font-size: 14px;
    }
    .toggle a {
      color: var(--blue);
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
    }
    .toggle a:hover { text-decoration: underline; }

    .footer {
      position: fixed;
      bottom: 20px;
      left: 0; right: 0;
      text-align: center;
      color: var(--text-mute);
      font-size: 12px;
      z-index: 2;
    }
    .footer a { color: var(--blue); text-decoration: none; }

    #successView { display: none; }
    #successView.show { display: block; }
    .check-icon {
      width: 88px; height: 88px;
      border-radius: 50%;
      background: rgba(16,185,129,0.15);
      border: 2px solid rgba(16,185,129,0.35);
      display: grid; place-items: center;
      margin: 0 auto 24px;
      animation: pop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .check-icon svg { width: 44px; height: 44px; color: var(--green); }
    .check-icon svg polyline {
      stroke-dasharray: 100;
      stroke-dashoffset: 100;
      animation: draw 0.6s 0.2s cubic-bezier(0.65, 0, 0.35, 1) forwards;
    }
    @keyframes pop {
      0% { transform: scale(0); opacity: 0; }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); opacity: 1; }
    }
    @keyframes draw { to { stroke-dashoffset: 0; } }

    @media (max-width: 480px) {
      .card { padding: 36px 22px 28px; border-radius: 24px; }
      h1 { font-size: 26px; }
    }
  </style>
</head>
<body>
  <div class="brand-mark">
    <div class="brand-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 16H9m10 0h3v-3.15a1 1 0 0 0-.84-.99L16 11l-2.7-3.6a1 1 0 0 0-.8-.4H5.24a2 2 0 0 0-1.8 1.1l-.8 1.63A6 6 0 0 0 2 12.42V16h2"></path>
        <circle cx="6.5" cy="16.5" r="2.5"></circle>
        <circle cx="16.5" cy="16.5" r="2.5"></circle>
      </svg>
    </div>
    <div class="brand-name">Kultura</div>
  </div>

  <div class="card">
    <div id="formView">
      <h1 id="title">Bun venit</h1>
      <p class="sub" id="subtitle">Autentifică-te pentru a continua</p>

      <div class="msg" id="msg">
        <svg id="msgIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"></circle>
        </svg>
        <span id="msgText"></span>
      </div>

      <form id="loginForm" autocomplete="on">
        <div class="field">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
            <polyline points="22,6 12,13 2,6"></polyline>
          </svg>
          <input type="email" id="email" placeholder="Email" required autocomplete="email">
        </div>
        <div class="field">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
          </svg>
          <input type="password" id="password" placeholder="Parolă" required minlength="6" autocomplete="current-password">
          <button type="button" class="eye" id="togglePwd" aria-label="Arată parola">
            <svg id="eyeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
          </button>
        </div>

        <button type="submit" class="btn" id="submitBtn">
          <span id="btnText">Autentifică-te</span>
        </button>
      </form>

      <p class="toggle">
        <span id="toggleText">Nu ai cont?</span>
        <a id="toggleLink">Înregistrează-te</a>
      </p>
    </div>

    <div id="successView">
      <div class="check-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="4 12 10 18 20 6"></polyline>
        </svg>
      </div>
      <h1 style="text-align:center">Autentificat!</h1>
      <p class="sub" id="successEmail">—</p>
      <button class="btn" id="openAppBtn" style="margin-top: 20px">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path>
          <polyline points="10 17 15 12 10 7"></polyline>
          <line x1="15" y1="12" x2="3" y2="12"></line>
        </svg>
        Deschide aplicația
      </button>
      <button class="btn ghost" id="logoutBtn" style="margin-top: 10px">Deconectare</button>
    </div>
  </div>

  <div class="footer">
    <a href="https://github.com/zazochannel-art/Kultura">GitHub</a>
    &nbsp;·&nbsp;
    <a href="confirmed.html">Suport</a>
  </div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    const SUPABASE_URL = 'https://knphmxxokowwkruimdus.supabase.co';
    const SUPABASE_ANON = 'sb_publishable_9b7WSJF4UlfF1JIdCDjWqQ_dxOTpqSW';
    const supa = createClient(SUPABASE_URL, SUPABASE_ANON, {
      auth: { persistSession: true, autoRefreshToken: true }
    });

    const el = (id) => document.getElementById(id);
    let isSignUp = false;

    function showMsg(kind, text) {
      const m = el('msg');
      m.className = 'msg show ' + kind;
      const icon = el('msgIcon');
      icon.innerHTML = kind === 'error'
        ? '<circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line>'
        : '<polyline points="20 6 9 17 4 12"></polyline>';
      el('msgText').textContent = text;
    }
    function hideMsg() { el('msg').className = 'msg'; }

    function toggleMode(e) {
      if (e) e.preventDefault();
      isSignUp = !isSignUp;
      el('title').textContent = isSignUp ? 'Bine ai venit' : 'Bun venit';
      el('subtitle').textContent = isSignUp ? 'Creează un cont pentru echipa ta' : 'Autentifică-te pentru a continua';
      el('btnText').textContent = isSignUp ? 'Creează cont' : 'Autentifică-te';
      el('toggleText').textContent = isSignUp ? 'Ai deja un cont?' : 'Nu ai cont?';
      el('toggleLink').textContent = isSignUp ? 'Autentifică-te' : 'Înregistrează-te';
      el('password').autocomplete = isSignUp ? 'new-password' : 'current-password';
      hideMsg();
    }

    el('toggleLink').addEventListener('click', toggleMode);

    el('togglePwd').addEventListener('click', () => {
      const p = el('password');
      const isPwd = p.type === 'password';
      p.type = isPwd ? 'text' : 'password';
      el('eyeIcon').innerHTML = isPwd
        ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>'
        : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
    });

    function showSuccess(email) {
      el('formView').style.display = 'none';
      el('successView').classList.add('show');
      el('successEmail').textContent = email;
    }

    el('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      hideMsg();
      const email = el('email').value.trim();
      const password = el('password').value;
      if (password.length < 6) {
        showMsg('error', 'Parola trebuie să aibă minim 6 caractere');
        return;
      }
      const btn = el('submitBtn');
      const originalText = el('btnText').textContent;
      btn.disabled = true;
      el('btnText').innerHTML = '<span class="spinner"></span>';

      try {
        if (isSignUp) {
          const { data, error } = await supa.auth.signUp({
            email, password,
            options: { emailRedirectTo: 'https://zazochannel-art.github.io/Kultura/confirmed.html' }
          });
          if (error) throw error;
          if (data.user && !data.session) {
            showMsg('success', 'Cont creat! Verifică emailul pentru linkul de confirmare.');
          } else if (data.session) {
            showSuccess(email);
          }
        } else {
          const { data, error } = await supa.auth.signInWithPassword({ email, password });
          if (error) throw error;
          showSuccess(email);
        }
      } catch (err) {
        showMsg('error', err.message || 'A apărut o eroare');
      } finally {
        btn.disabled = false;
        el('btnText').textContent = originalText;
      }
    });

    el('openAppBtn').addEventListener('click', () => {
      window.location.href = 'kultura://login';
    });

    el('logoutBtn').addEventListener('click', async () => {
      await supa.auth.signOut();
      el('successView').classList.remove('show');
      el('formView').style.display = 'block';
      el('email').value = '';
      el('password').value = '';
      hideMsg();
    });

    // Auto-detect existing session on load
    (async () => {
      const { data: { session } } = await supa.auth.getSession();
      if (session?.user?.email) {
        showSuccess(session.user.email);
      }
    })();
  </script>
</body>
</html>
