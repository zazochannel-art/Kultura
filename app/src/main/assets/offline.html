<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Kultura — Offline</title>
  <style>
    :root {
      --bg: #07080d; --text: #f8fafc; --dim: #94a3b8;
      --blue: #3b82f6; --cyan: #06b6d4; --purple: #8b5cf6;
      --border: rgba(255,255,255,0.14);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; display: grid; place-items: center;
      padding: 24px; overflow: hidden; position: relative;
      -webkit-font-smoothing: antialiased;
    }
    body::before {
      content: ""; position: fixed; width: 420px; height: 420px;
      border-radius: 50%; background: var(--purple); opacity: 0.22;
      filter: blur(120px); top: -140px; left: -140px; pointer-events: none;
    }
    .card {
      width: 100%; max-width: 400px; text-align: center;
      background: linear-gradient(160deg, rgba(26,31,53,0.92), rgba(14,17,32,0.85));
      border: 1px solid var(--border); border-radius: 26px;
      padding: 40px 28px; position: relative;
    }
    .icon {
      width: 84px; height: 84px; margin: 0 auto 24px;
      border-radius: 50%; display: grid; place-items: center;
      background: rgba(59,130,246,0.12); border: 2px solid rgba(59,130,246,0.3);
    }
    .icon svg { width: 40px; height: 40px; color: var(--blue); }
    h1 { font-size: 24px; font-weight: 900; letter-spacing: -0.6px; margin-bottom: 10px; }
    p { color: var(--dim); font-size: 14px; line-height: 1.55; margin-bottom: 28px; }
    a.retry {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; padding: 15px 22px; font-size: 15px; font-weight: 700;
      color: #fff; text-decoration: none; border-radius: 14px;
      background: linear-gradient(90deg, var(--blue), var(--cyan));
      box-shadow: 0 12px 28px rgba(59,130,246,0.35);
    }
    a.retry:active { transform: translateY(1px); }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="1" y1="1" x2="23" y2="23"></line>
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"></path>
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"></path>
        <path d="M10.71 5.05A16 16 0 0 1 22.58 9"></path>
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"></path>
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path>
        <line x1="12" y1="20" x2="12.01" y2="20"></line>
      </svg>
    </div>
    <h1>Fără conexiune</h1>
    <p>Nu ne putem conecta la internet. Verifică rețeaua Wi-Fi sau datele mobile și încearcă din nou.</p>
    <a class="retry" href="https://zazochannel-art.github.io/Kultura/">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
      Reîncearcă
    </a>
  </div>
  <script>
    // Auto-retry the moment the connection comes back.
    window.addEventListener('online', function () {
      window.location.href = 'https://zazochannel-art.github.io/Kultura/';
    });
  </script>
</body>
</html>
